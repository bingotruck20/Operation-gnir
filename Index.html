<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fælles Front">
    <meta name="theme-color" content="#121212">
    <title>Fælles Front: Nul-Køb</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-green: #00e676;
            --accent-blue: #2979ff;
            --accent-gold: #ffd700;
            --danger: #ff1744;
            --p1-color: #ff4081; /* Pink/Rød for P1 */
            --p2-color: #00e5ff; /* Cyan/Blå for P2 */
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0 auto; /* Centrerer appen på større skærme */
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            max-width: 600px; /* Sikrer at appen ikke bliver for bred på desktop */
        }
        
        h1, h2, h3 { margin-top: 0; margin-bottom: 15px; }
        
        .card {
            background: var(--panel-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }
        
        .streak-number {
            font-size: 72px;
            font-weight: bold;
            color: var(--accent-gold);
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .metric-label { font-size: 14px; color: var(--text-muted); }
        
        /* Wall of Shame (VS Mode) */
        .vs-container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            margin-top: 15px;
        }
        .player-card {
            flex: 1;
            background: #252525;
            padding: 15px 10px;
            border-radius: 8px;
            border-top: 4px solid #444;
        }
        .player-card.p1 { border-top-color: var(--p1-color); }
        .player-card.p2 { border-top-color: var(--p2-color); }
        
        .player-name {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            width: 100%;
            padding: 0;
            margin-bottom: 5px;
            border-bottom: 1px dashed #555;
        }
        .player-wasted {
            font-size: 20px;
            font-weight: bold;
            color: var(--danger);
            margin-top: 5px;
        }

        input, select, button {
            width: 100%;
            padding: 14px 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            font-size: 16px;
            text-align: center;
            -webkit-appearance: none;
        }
        select { text-align: left; }
        
        button {
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        .btn-success { background-color: var(--accent-green); color: #000; }
        .btn-danger { background-color: transparent; border: 2px solid var(--danger); color: var(--danger); margin-bottom: 0; }
        
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
            text-align: left;
            align-items: center;
        }
        .log-item:last-child { border-bottom: none; }
        .text-green { color: var(--accent-green); font-weight: bold; }
        .text-red { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="metric-label">Vores Fælles Streak 🛡️</div>
        <div class="streak-number" id="sharedStreak">0</div>
        <div class="metric-label">Dage husstanden har overlevet uden spildkøb</div>
    </div>

    <div class="card">
        <h3>Wall of Shame 💸</h3>
        <div class="metric-label">Hvem har spildt flest penge samlet set?</div>
        <div class="vs-container">
            <div class="player-card p1">
                <input type="text" id="p1Name" class="player-name" value="Spiller 1">
                <div class="metric-label">Har spildt:</div>
                <div class="player-wasted" id="p1Wasted">0 kr.</div>
            </div>
            <div class="player-card p2">
                <input type="text" id="p2Name" class="player-name" value="Spiller 2">
                <div class="metric-label">Har spildt:</div>
                <div class="player-wasted" id="p2Wasted">0 kr.</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Dagens Dom</h3>
        <button class="btn-success" id="btnSuccess">✅ Vi holdt begge stand!</button>
        
        <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 20px;">
            <div class="metric-label" style="margin-bottom: 10px; color: var(--danger);">Nogen faldt i (Streak Nulstilles):</div>
            <select id="culprit">
                <option value="" disabled selected>Hvem ødelagde det?</option>
                <option value="p1" id="optP1">Spiller 1</option>
                <option value="p2" id="optP2">Spiller 2</option>
                <option value="both">Vi fejlede begge to</option>
            </select>
            <input type="number" id="failAmount" placeholder="Beløb spildt (kr.)" inputmode="decimal">
            <input type="text" id="failReason" placeholder="Hvad blev der købt?">
            <button class="btn-danger" id="btnFail">🚨 Nulstil Streak</button>
        </div>
    </div>

    <div class="card">
        <h3>Kamplog</h3>
        <div id="logContainer"></div>
    </div>

    <script>
        // Data-struktur
        let state = {
            sharedStreak: 0,
            bestStreak: 0,
            p1Name: "Spiller 1",
            p2Name: "Spiller 2",
            p1Wasted: 0,
            p2Wasted: 0,
            logs: []
        };

        // Valuta-formatering opsættes én gang for bedre ydeevne
        const currencyFormatter = new Intl.NumberFormat('da-DK', { maximumFractionDigits: 0 });

        function init() {
            // Hent data fra LocalStorage, hvis det findes
            const saved = localStorage.getItem('coopNoSpend');
            if (saved) state = { ...state, ...JSON.parse(saved) };
            
            // Sæt navne i input-felter
            document.getElementById('p1Name').value = state.p1Name;
            document.getElementById('p2Name').value = state.p2Name;
            
            // Opsætning af Event Listeners (Gør koden mere sikker for GitHub/CSP)
            document.getElementById('p1Name').addEventListener('input', saveNames);
            document.getElementById('p2Name').addEventListener('input', saveNames);
            document.getElementById('btnSuccess').addEventListener('click', logSuccess);
            document.getElementById('btnFail').addEventListener('click', logFail);

            updateUI();
        }

        function saveData() {
            localStorage.setItem('coopNoSpend', JSON.stringify(state));
        }

        function saveNames() {
            state.p1Name = document.getElementById('p1Name').value || "Spiller 1";
            state.p2Name = document.getElementById('p2Name').value || "Spiller 2";
            saveData();
            updateUI();
        }

        function fireConfetti() {
            const colors = ['#00e676', '#ffd700', '#ffffff'];
            for (let i = 0; i < 70; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.zIndex = '9999';
                confetti.style.pointerEvents = 'none';
                document.body.appendChild(confetti);

                const animation = confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*150 - 75}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], { duration: Math.random() * 2000 + 1000, easing: 'linear' });

                animation.onfinish = () => confetti.remove();
            }
        }

        function logSuccess() {
            const today = new Date().toLocaleDateString('da-DK');
            
            // Undgå at logge dobbelt på samme dag
            if (state.logs.length > 0 && state.logs[0].date === today && state.logs[0].type === 'success') {
                if(!confirm("Dagen er allerede logget som en succes. Vil du tilføje en mere alligevel?")) return;
            }

            state.sharedStreak++;
            if(state.sharedStreak > state.bestStreak) state.bestStreak = state.sharedStreak;
            
            state.logs.unshift({ id: Date.now(), date: today, type: 'success' });
            
            fireConfetti();
            saveData();
            updateUI();
        }

        function logFail() {
            const culprit = document.getElementById('culprit').value;
            const amountText = document.getElementById('failAmount').value.replace(',', '.');
            const amount = parseFloat(amountText);
            const reason = document.getElementById('failReason').value.trim() || 'Ukendt spild';

            // Validering
            if (!culprit) return alert("Vælg hvem der ødelagde streaket.");
            if (isNaN(amount) || amount <= 0) return alert("Indtast et gyldigt beløb.");
            
            // Sikkerhedsbekræftelse (ny funktion tilføjet)
            if (!confirm(`Er du sikker på, at du vil nulstille jeres streak og registrere ${amount} kr. som spildt?`)) return;

            const today = new Date().toLocaleDateString('da-DK');
            let culpritName = "";

            if (culprit === 'p1') {
                state.p1Wasted += amount;
                culpritName = state.p1Name;
            } else if (culprit === 'p2') {
                state.p2Wasted += amount;
                culpritName = state.p2Name;
            } else {
                state.p1Wasted += (amount / 2);
                state.p2Wasted += (amount / 2);
                culpritName = "Begge";
            }

            state.sharedStreak = 0; // Husstandens straf
            
            state.logs.unshift({
                id: Date.now(),
                date: today,
                type: 'fail',
                who: culpritName,
                amount: amount,
                reason: reason
            });

            // Nulstil inputfelter
            document.getElementById('culprit').value = "";
            document.getElementById('failAmount').value = "";
            document.getElementById('failReason').value = "";

            saveData();
            updateUI();
        }

        function updateUI() {
            // Opdater streak
            document.getElementById('sharedStreak').innerText = state.sharedStreak;
            
            // Opdater beløb med valutaformatering
            document.getElementById('p1Wasted').innerText = currencyFormatter.format(state.p1Wasted) + ' kr.';
            document.getElementById('p2Wasted').innerText = currencyFormatter.format(state.p2Wasted) + ' kr.';
            
            // Opdater dropdown-navne
            document.getElementById('optP1').innerText = state.p1Name;
            document.getElementById('optP2').innerText = state.p2Name;

            // Opdater kamploggen
            const container = document.getElementById('logContainer');
            if (state.logs.length === 0) {
                container.innerHTML = '<div class="metric-label">Ingen data at vise. Begynd kampen!</div>';
                return;
            }

            let html = '';
            state.logs.slice(0, 15).forEach(log => {
                if (log.type === 'success') {
                    html += `
                        <div class="log-item">
                            <div>${log.date}</div>
                            <div class="text-green">✅ Fejlfri Dag</div>
                        </div>`;
                } else {
                    html += `
                        <div class="log-item">
                            <div>
                                <strong>${log.date}</strong> <span style="color:var(--text-muted)">(${log.who})</span><br>
                                <span class="metric-label">${log.reason}</span>
                            </div>
                            <div class="text-red">-${currencyFormatter.format(log.amount)} kr.</div>
                        </div>`;
                }
            });
            container.innerHTML = html;
        }

        // Start appen når HTML'en er indlæst
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
