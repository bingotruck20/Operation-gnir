<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fælles Front">
    <meta name="theme-color" content="#121212">
    <title>Fælles Front: Nul-Køb</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-green: #00e676;
            --accent-blue: #2979ff;
            --accent-gold: #ffd700;
            --danger: #ff1744;
            --p1-color: #ff4081; 
            --p2-color: #00e5ff; 
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            background: var(--panel-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }
        .streak-number {
            font-size: 72px;
            font-weight: bold;
            color: var(--accent-gold);
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .metric-label { font-size: 14px; color: var(--text-muted); }
        .vs-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }
        .player-card {
            flex: 1;
            background: #252525;
            padding: 15px 10px;
            border-radius: 8px;
            border-top: 4px solid #444;
        }
        .player-card.p1 { border-top-color: var(--p1-color); }
        .player-card.p2 { border-top-color: var(--p2-color); }
        .player-name {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            width: 100%;
            margin-bottom: 5px;
            border-bottom: 1px dashed #555;
        }
        .player-wasted {
            font-size: 20px;
            font-weight: bold;
            color: var(--danger);
            margin-top: 5px;
        }
        input, select, button {
            width: 100%;
            padding: 14px 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        button {
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-success { background-color: var(--accent-green); color: #000; }
        .btn-danger { background-color: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
            text-align: left;
        }
        .text-green { color: var(--accent-green); font-weight: bold; }
        .text-red { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="metric-label">Vores Fælles Streak 🛡️</div>
        <div class="streak-number" id="sharedStreak">0</div>
        <div class="metric-label">Dage uden spildkøb</div>
    </div>

    <div class="card">
        <h3>Skammekrogen 💸</h3>
        <div class="vs-container">
            <div class="player-card p1">
                <input type="text" id="p1Name" class="player-name" value="Spiller 1" onchange="saveNames()">
                <div class="player-wasted" id="p1Wasted">0 kr.</div>
            </div>
            <div class="player-card p2">
                <input type="text" id="p2Name" class="player-name" value="Spiller 2" onchange="saveNames()">
                <div class="player-wasted" id="p2Wasted">0 kr.</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Dagens Dom</h3>
        <button class="btn-success" onclick="logSuccess()">✅ Vi holdt begge stand!</button>
        <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
            <select id="culprit">
                <option value="" disabled selected>Hvem faldt i?</option>
                <option value="p1" id="optP1">Spiller 1</option>
                <option value="p2" id="optP2">Spiller 2</option>
                <option value="both">Begge</option>
            </select>
            <input type="number" id="failAmount" placeholder="Beløb (kr.)" inputmode="decimal">
            <input type="text" id="failReason" placeholder="Hvad blev købt?">
            <button class="btn-danger" onclick="logFail()">🚨 Nulstil Streak</button>
        </div>
    </div>

    <div class="card">
        <h3>Historik</h3>
        <div id="logContainer"></div>
    </div>

    <script>
        let state = { sharedStreak: 0, p1Name: "Spiller 1", p2Name: "Spiller 2", p1Wasted: 0, p2Wasted: 0, logs: [] };

        function init() {
            const saved = localStorage.getItem('coopNoSpend');
            if (saved) state = { ...state, ...JSON.parse(saved) };
            document.getElementById('p1Name').value = state.p1Name;
            document.getElementById('p2Name').value = state.p2Name;
            updateUI();
        }

        function saveData() { localStorage.setItem('coopNoSpend', JSON.stringify(state)); }

        function saveNames() {
            state.p1Name = document.getElementById('p1Name').value;
            state.p2Name = document.getElementById('p2Name').value;
            saveData();
            updateUI();
        }

        function logSuccess() {
            state.sharedStreak++;
            state.logs.unshift({ date: new Date().toLocaleDateString('da-DK'), type: 'success' });
            saveData();
            updateUI();
        }

        function logFail() {
            const culprit = document.getElementById('culprit').value;
            const amount = parseFloat(document.getElementById('failAmount').value) || 0;
            const reason = document.getElementById('failReason').value || 'Spild';

            if (!culprit) return alert("Vælg hvem der faldt i");
            if (culprit === 'p1') state.p1Wasted += amount;
            else if (culprit === 'p2') state.p2Wasted += amount;
            else { state.p1Wasted += amount/2; state.p2Wasted += amount/2; }

            state.sharedStreak = 0;
            state.logs.unshift({ date: new Date().toLocaleDateString('da-DK'), type: 'fail', who: culprit, amount, reason });
            saveData();
            updateUI();
        }

        function updateUI() {
            document.getElementById('sharedStreak').innerText = state.sharedStreak;
            document.getElementById('p1Wasted').innerText = state.p1Wasted + ' kr.';
            document.getElementById('p2Wasted').innerText = state.p2Wasted + ' kr.';
            document.getElementById('optP1').innerText = state.p1Name;
            document.getElementById('optP2').innerText = state.p2Name;
            
            const html = state.logs.slice(0, 10).map(log => `
                <div class="log-item">
                    <div>${log.date}</div>
                    <div class="${log.type === 'success' ? 'text-green' : 'text-red'}">
                        ${log.type === 'success' ? '✅' : '💸 ' + log.amount + ' kr.'}
                    </div>
                </div>
            `).join('');
            document.getElementById('logContainer').innerHTML = html || 'Ingen data endnu';
        }

        init();
    </script>
</body>
</html>
